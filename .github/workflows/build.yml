name: Build VixBasior VST3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo (VixBasior source)
        uses: actions/checkout@v4

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: master
          path: JUCE

      - name: Configure (CMake)
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Show build output (debug helper)
        run: dir /s /b build\VixBasior_artefacts\Release
        shell: cmd

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: VixBasior-VST3
          path: build/VixBasior_artefacts/Release/VST3/**

      - name: Upload Standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: VixBasior-Standalone
          path: build/VixBasior_artefacts/Release/Standalone/**
